name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Validate ────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: composer validate --no-check-publish
      - name: Check syntax
        run: find config contracts models storage public -name "*.php" | xargs -r php -l

  # ── 2. Unit + Smoke (PHP matrix) ───────────────────────────────────────
  tests:
    name: Tests / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_mysql, apcu
          ini-values: apc.enabled=1, apc.enable_cli=1
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer test:unit
      - run: composer test:smoke

  # ── 3. Integration (MySQL) ─────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: validate
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: pdf_store_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, apcu
          ini-values: apc.enabled=1, apc.enable_cli=1
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Apply migrations
        run: |
          mysql -u root -h 127.0.0.1 pdf_store_test < migrations/001_create_tables.sql
          mysql -u root -h 127.0.0.1 pdf_store_test < migrations/002_add_indexes_cascade.sql
          mysql -u root -h 127.0.0.1 pdf_store_test < migrations/003_add_users_multitenancy.sql
      - run: composer test:integration

  # ── 4. Coverage ────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, apcu
          ini-values: apc.enabled=1, apc.enable_cli=1
          coverage: pcov
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run tests with coverage
        run: composer test:unit -- --coverage-clover coverage.xml --coverage-text
      - name: Check coverage threshold (≥60%)
        run: |
          COVERAGE=$(php -r "
            \$xml = simplexml_load_file('coverage.xml');
            \$metrics = \$xml->project->metrics;
            \$total = (int)\$metrics['statements'];
            \$covered = (int)\$metrics['coveredstatements'];
            if (\$total === 0) { echo '0'; exit; }
            echo round(\$covered / \$total * 100, 1);
          ")
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below the required 60%"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── 5. Static Analysis ─────────────────────────────────────────────────
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer analyse

  # ── 6. Code Style ──────────────────────────────────────────────────────
  cs:
    name: Code Style
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer cs:check
