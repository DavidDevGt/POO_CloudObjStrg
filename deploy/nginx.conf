# Nginx configuration for POO_CloudObjStrg
# Place at: /etc/nginx/sites-available/pdfmanager
# Enable: ln -s /etc/nginx/sites-available/pdfmanager /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;          # <-- change to your domain or LAN IP

    # Redirect HTTP → HTTPS (enable once you have a cert)
    # return 301 https://$host$request_uri;

    root /var/www/pdfmanager/public;
    index index.php;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "SAMEORIGIN"                    always;
    add_header X-XSS-Protection        "1; mode=block"                 always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }
    location ~* \.(env|json|lock|xml|md|sql)$ {
        deny all;
    }

    # Block direct access to uploads directory
    location /uploads/ {
        deny all;
    }

    # Route all requests through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;   # adjust PHP version
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Hide PHP version
        fastcgi_hide_header X-Powered-By;
    }

    # Gzip static assets
    gzip on;
    gzip_types text/css application/javascript;

    # File upload limit — must match UPLOAD_MAX_SIZE in .env
    client_max_body_size 10M;

    access_log /var/log/nginx/pdfmanager.access.log;
    error_log  /var/log/nginx/pdfmanager.error.log;
}

